<div id="popup-1" class="popup">
  <div class="popup__wrap" data-lenis-prevent>
    <div class="popup__content">
      <div class="popup__head">
        <div class="popup__title">
          Отправьте заявку
        </div>
      </div>
      <div class="popup__body">
        <form class="form-inner" action="#">
          <div class="form-body">

            <div class="form-block">
              <div class="form-title">
                Ваши данные
              </div>
              <div class="form-content">
                <div class="form-group">
                  <div class="form-icon">
                    <i class="icon-person"></i>
                  </div>
                  <input class="form-input" type="text" name="popup_callback_name" id="" placeholder="Имя">
                </div>
                <div class="form-group">
                  <div class="form-icon">
                    <i class="icon-phone"></i>
                  </div>
                  <input class="form-input" type="tel" name="popup_callback_tel" id="" placeholder="Телефон">
                </div>
              </div>
            </div>

            <div class="form-block">
              <div class="form-title">
                Маршрут
              </div>
              <div class="form-content">
                <div class="form-group">
                  <div class="form-icon">
                    <i class="icon-otkuda"></i>
                  </div>
                  <input class="form-input" type="text" name="popup_callback_otkuda" id="" placeholder="Откуда">
                </div>
                <div class="form-group">
                  <div class="form-icon">
                    <i class="icon-kuda"></i>
                  </div>
                  <input class="form-input" type="text" name="popup_callback_kuda" id="" placeholder="Куда">
                </div>
              </div>

              <div class="form-items form-col-2">
                <div class="form-item">
                  <div class="form-group">
                    <label class="form-label">
                      Общий вес груза
                    </label>
                  </div>
                  <div class="form-group form-total form-total-weight">
                    <input class="form-input" type="text" name="popup_callback_weight" id="" placeholder="0">
                  </div>
                </div>
                <div class="form-item">
                  <div class="form-group">
                    <label class="form-label">
                      Общий объём груза
                    </label>
                  </div>
                  <div class="form-group form-total form-total-volume">
                    <input class="form-input" type="text" name="popup_callback_volume" id="" placeholder="0">
                  </div>
                </div>
              </div>
            </div>

          </div>
          <div class="form-foot">
            <button class="btn form-btn" data-fancybox href="#popup-3">
              <div class="btn-text">
                Отправить
              </div>
            </button>
            <div class="form-privacy">
              <div class="form-group">
                <label class="form-checkbox-label">
                  <input class="form-checkbox-input" name="popup_callback_privacy" type="checkbox">
                  <div class="form-checkbox-item"></div>
                  <div class="form-checkbox-text">
                    Я согласен на обработку персональных данных
                  </div>
                </label>
              </div>
              <div class="form-group">
                <label class="form-checkbox-label">
                  <input class="form-checkbox-input" name="popup_callback_ads" type="checkbox">
                  <div class="form-checkbox-item"></div>
                  <div class="form-checkbox-text">
                    Я согласен на рекламные уведомления
                  </div>
                </label>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
