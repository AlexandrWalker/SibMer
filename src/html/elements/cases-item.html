<div class="cases__item cases-item--js @@class-active" data-cases="@@data-cases">
  <div class="cases__item-head">
    <div class="general__head">
      <div class="general__title">
        <h2>
          @@title
        </h2>
      </div>
      <div class="cases__item-wrap">
        <div class="cases__item-wrap--content">
          <div class="cases__item-img">
            <picture>
              <source media="(min-width: 601px)" srcset="@@img">
              <source media="(max-width: 600px)" srcset="@@img-mob">
              <img src="@@img" alt="">
            </picture>
          </div>
          <div class="general__feat">
            <div class="general__feat-item">
              <div class="general__feat-title">
                @@num-1 м3
                <!-- <div class="numbers">
                  <div class="cases-number-roll" data-number="@@num-1"></div>
                  <span>&nbsp;м3</span>
                </div> -->
              </div>
              <div class="general__feat-text">
                Объём доставленного груза
              </div>
            </div>
            <div class="general__feat-item">
              <div class="general__feat-title">
                @@num-2 тонн
                <!-- <div class="numbers">
                  <div class="cases-number-roll" data-number="@@num-2"></div>
                  <span>&nbsp;тонн</span>
                </div> -->
              </div>
              <div class="general__feat-text">
                Вес доставленного груза
              </div>
            </div>
            <div class="general__feat-item">
              <div class="general__feat-title">
                @@num-3 дней
                <!-- <div class="numbers">
                  <div class="cases-number-roll" data-number="@@num-3"></div>
                  <span>&nbsp;дней</span>
                </div> -->
              </div>
              <div class="general__feat-text">
                Срок доставки
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="cases__item-icon">
      <i class="icon-plus"></i>
    </div>
  </div>
  <div class="cases__item-body">
    <div class="cases__item-content">
      <div class="cases__item-title">
        <p>
          01. Задача
        </p>
      </div>
      <div class="cases__item-text">
        <p>
          @@text-1
        </p>
      </div>
      <div class="cases__item-title">
        <p>
          02. Проблема
        </p>
      </div>
      <div class="cases__item-text">
        <p>
          @@text-2
        </p>
      </div>
      <div class="cases__item-title">
        <p>
          03. Решение
        </p>
      </div>
      <div class="cases__item-text">
        <p>
          @@text-3
        </p>
      </div>
      <div class="cases__item-title">
        <p>
          04. Результат
        </p>
      </div>
      <div class="cases__item-text">
        <p>
          @@text-4
        </p>
      </div>
    </div>
  </div>
</div>
